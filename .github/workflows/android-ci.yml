name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle (with cache)
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK packages
        run: |
          SDK="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDK" --licenses >/dev/null 2>&1 || true
          "$SDK" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Create local.properties (inject OpenWeatherMap key)
        run: |
          echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" > local.properties

      - name: Write google-services.json (only if secret is set)
        env:
          GS: ${{ secrets.GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$GS" ]; then
            printf '%s' "$GS" > app/google-services.json
            echo "google-services.json written"
          else
            echo "GOOGLE_SERVICES_JSON not set — skipping (Firebase not wired yet)"
          fi

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Lint (non-blocking)
        run: ./gradlew lintDebug --no-daemon || true
