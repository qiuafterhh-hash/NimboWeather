name: Android Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # JVM unit tests (AQI, MoonPhase, ...). Runs on an ASCII path, so it does NOT
  # hit the local non-ASCII-path test-worker classloader bug.
  # ---------------------------------------------------------------------------
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android SDK packages
        run: |
          SDK="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDK" --licenses >/dev/null 2>&1 || true
          "$SDK" "platform-tools" "platforms;android-35" "build-tools;35.0.0"
      - name: Inject OpenWeatherMap key
        run: echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" > local.properties
      - run: chmod +x ./gradlew
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace
      - name: Upload unit-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Instrumented (emulator) tests: Espresso UI + Maestro black-box flows +
  # Monkey stability. Boots a hardware-accelerated emulator in the cloud, so it
  # bypasses the local WHPX 0-CPU problem entirely.
  # ---------------------------------------------------------------------------
  instrumented-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [34]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM (hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Inject OpenWeatherMap key
        run: echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" > local.properties
      - run: chmod +x ./gradlew

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Create AVD + warm snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot."

      - name: Run instrumented + Maestro + Monkey
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          # NOTE: android-emulator-runner executes each script LINE in its own
          # `sh -c`, so shell variables do NOT persist across lines. Each stage
          # therefore records its exit code to a file, and the final line sums
          # them — running every layer while still failing the job if any failed.
          script: |
            adb logcat -c || true
            echo "::group::Espresso instrumented tests"; ./gradlew connectedDebugAndroidTest --no-daemon --stacktrace; echo $? > "$HOME/r_espresso"; echo "::endgroup::"
            echo "::group::Install debug APK"; ./gradlew installDebug --no-daemon; echo $? > "$HOME/r_install"; echo "::endgroup::"
            echo "::group::Maestro functional UI flows"; maestro test .maestro --format junit --output maestro-report.xml; echo $? > "$HOME/r_maestro"; echo "::endgroup::"
            echo "::group::Monkey stability (1500 events)"; adb shell monkey -p com.nimboweather.forecast --pct-syskeys 0 --throttle 300 -v 1500 > monkey.log 2>&1; echo $? > "$HOME/r_monkey"; cat monkey.log; echo "::endgroup::"
            adb logcat -d > logcat.txt || true
            echo "RESULTS espresso=$(cat $HOME/r_espresso) install=$(cat $HOME/r_install) maestro=$(cat $HOME/r_maestro) monkey=$(cat $HOME/r_monkey)"
            exit $(( $(cat "$HOME/r_espresso" 2>/dev/null || echo 1) + $(cat "$HOME/r_install" 2>/dev/null || echo 1) + $(cat "$HOME/r_maestro" 2>/dev/null || echo 1) + $(cat "$HOME/r_monkey" 2>/dev/null || echo 1) ))

      - name: Upload instrumented reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-reports-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/connected
            maestro-report.xml
            monkey.log
            logcat.txt
          if-no-files-found: warn
