name: Android Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # JVM unit tests (AQI, MoonPhase, ...). Runs on an ASCII path, so it does NOT
  # hit the local non-ASCII-path test-worker classloader bug.
  # ---------------------------------------------------------------------------
  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4
      - name: Install Android SDK packages
        run: |
          SDK="$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager"
          yes | "$SDK" --licenses >/dev/null 2>&1 || true
          "$SDK" "platform-tools" "platforms;android-35" "build-tools;35.0.0"
      - name: Inject OpenWeatherMap key
        run: echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" > local.properties
      - run: chmod +x ./gradlew
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon --stacktrace
      - name: Upload unit-test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-report
          path: app/build/reports/tests/testDebugUnitTest
          if-no-files-found: warn

  # ---------------------------------------------------------------------------
  # Instrumented (emulator) tests: Espresso UI + Maestro black-box flows +
  # Monkey stability. Boots a hardware-accelerated emulator in the cloud, so it
  # bypasses the local WHPX 0-CPU problem entirely.
  # ---------------------------------------------------------------------------
  instrumented-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        api-level: [34]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: gradle/actions/setup-gradle@v4

      - name: Enable KVM (hardware acceleration)
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Inject OpenWeatherMap key
        run: echo "OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}" > local.properties
      - run: chmod +x ./gradlew

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ matrix.api-level }}

      - name: Create AVD + warm snapshot
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: echo "Generated AVD snapshot."

      - name: Run instrumented + Maestro + Monkey
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          profile: pixel_6
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            # Run every layer and aggregate — Espresso / Maestro / monkey are
            # independent signals, so one failing must not skip the others.
            set +e
            export PATH="$PATH:$HOME/.maestro/bin"
            adb logcat -c || true
            fail=0

            echo "::group::Espresso instrumented tests"
            ./gradlew connectedDebugAndroidTest --no-daemon --stacktrace || fail=1
            echo "::endgroup::"

            echo "::group::Install debug APK for black-box testing"
            ./gradlew installDebug --no-daemon || fail=1
            echo "::endgroup::"

            echo "::group::Maestro functional UI flows"
            maestro test .maestro --format junit --output maestro-report.xml || fail=1
            echo "::endgroup::"

            echo "::group::Monkey stability (1500 events)"
            # Warm the process with the test flag so ads stay out of monkey's way,
            # then fuzz. The static flag persists for the life of the process.
            adb shell am start -n com.nimboweather.forecast/.ui.splash.SplashActivity --ez nimbo_test true
            sleep 3
            adb shell monkey -p com.nimboweather.forecast --pct-syskeys 0 --throttle 300 -v 1500 > monkey.log 2>&1
            mc=$?
            cat monkey.log
            [ "$mc" -ne 0 ] && fail=1
            echo "::endgroup::"

            adb logcat -d > logcat.txt || true
            exit $fail

      - name: Upload instrumented reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-reports-api${{ matrix.api-level }}
          path: |
            app/build/reports/androidTests/connected
            maestro-report.xml
            monkey.log
            logcat.txt
          if-no-files-found: warn
